[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:esp32s3_n16r8]
platform = espressif32
board = lolin_s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
board_build.arduino.memory_type = qio_opi

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++11
